name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax check
        run: bash -n freshrss-patch.sh freshrss-fetch.sh freshrss-yt-favicons.sh
      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: '.github'
